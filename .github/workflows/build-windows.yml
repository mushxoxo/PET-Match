name: Build Windows executable

# Produces numobel.exe with PyInstaller on a Windows runner (PyInstaller cannot
# cross-compile, so the .exe must be built on Windows). Runs automatically when a
# version tag is pushed (e.g. v1.0.0) and can also be triggered manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to attach the .exe to the GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build numobel.exe
        run: pyinstaller numobel.spec

      - name: Verify the executable exists
        shell: pwsh
        run: |
          if (-not (Test-Path dist/numobel.exe)) {
            Write-Error "dist/numobel.exe was not produced"
            exit 1
          }
          Get-Item dist/numobel.exe | Format-List Name, Length

      # numobel.db and images/ are intentionally NOT bundled (see numobel.spec):
      # the app anchors to the executable's directory at runtime. Ship the .exe
      # alongside a numobel.db produced by `python -m numobel.importer.run_import`.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: numobel-windows
          path: dist/numobel.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/numobel.exe
